name: Lumifaste
options:
  bundleIdPrefix: com.theknack
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    MARKETING_VERSION: "1.2.0"
    CURRENT_PROJECT_VERSION: "10"
    DEVELOPMENT_TEAM: "99H9NJ6Z6J"
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: "6.0"
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_CFBundleDisplayName: "Lumifaste"
    INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.healthcare-fitness"
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    ENABLE_PREVIEWS: YES
    SWIFT_EMIT_LOC_STRINGS: YES

packages:
  TelemetryDeck:
    url: https://github.com/TelemetryDeck/SwiftSDK
    from: "2.0.0"
  TheKnackKit:
    path: ../TheKnackKit

targets:
  Lumifaste:
    type: application
    platform: iOS
    sources:
      - Sources
    resources:
      - path: Sources/Resources
    dependencies:
      - target: LiveActivityWidget
        embed: true
      - package: TelemetryDeck
      - package: TheKnackKit
        product: SessionClock
    settings:
      base:
        INFOPLIST_FILE: Sources/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/Resources/Lumifaste.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.theknack.lumifaste
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE: NO

  LiveActivityWidget:
    type: app-extension
    platform: iOS
    sources:
      - LiveActivityWidget
      - Sources/LiveActivity
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.theknack.lumifaste.LiveActivityWidget
        INFOPLIST_FILE: LiveActivityWidget/Info.plist
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: "99H9NJ6Z6J"
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Lumifaste
        INFOPLIST_KEY_NSExtension_NSExtensionPointIdentifier: com.apple.widgetkit-extension
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    dependencies: []

schemes:
  Lumifaste:
    build:
      targets:
        Lumifaste: all
        LiveActivityWidget: all
    run:
      config: Debug
      executable: Lumifaste
      storeKitConfiguration: Products.storekit
    test:
      config: Debug
      storeKitConfiguration: Products.storekit
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
